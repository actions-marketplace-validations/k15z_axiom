name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -buildvcs=false ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Install axiom
        run: go install -buildvcs=false ./cmd/axiom/

      - name: Run axiom
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: axiom run --all
